  <rect x="98" y="102" width="134" height="26" rx="6" fill="#312e81"/>
  <rect x="98" y="102" width="60" height="26" rx="6" fill="#6366f1"/>

  <rect x="98" y="142" width="60" height="50" rx="8" fill="#1e1b4b"/>
  <rect x="166" y="142" width="66" height="50" rx="8" fill="#1e1b4b"/>
  <path d="M104,182 L118,160 L130,172 L152,148" stroke="#818cf8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
