    <circle cx="22" cy="34" r="2.5" fill="#0ea5e9"/>
  </g>

  <!-- floating badge: shield -->
  <g transform="translate(300,70)">
    <circle cx="18" cy="18" r="24" fill="#ffffff"/>
    <circle cx="18" cy="18" r="24" fill="none" stroke="#e0f2fe" stroke-width="2"/>
    <path d="M18,7 L28,11 V19 C28,26 24,30 18,32 C12,30 8,26 8,19 V11 Z" fill="#0ea5e9"/>
    <path d="M13,18 L17,22 L24,14" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
