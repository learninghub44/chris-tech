<svg viewBox="0 0 400 360" xmlns="http://www.w3.org/2000/svg">
  <!-- Blob background -->
  <path d="M328,152 C342,222 298,303 216,326 C128,352 30,304 16,220 C2,138 56,50 148,22 C242,-7 314,80 328,152 Z" fill="#a855f7" fill-opacity="0.12"/>

  <!-- Chip / AI head -->
  <rect x="120" y="110" width="160" height="150" rx="22" fill="#0f172a"/>
  <rect x="145" y="135" width="110" height="100" rx="14" fill="#3b0764"/>

  <!-- neural nodes -->
  <g stroke="#c084fc" stroke-width="2.5" fill="#c084fc">
    <line x1="170" y1="155" x2="200" y2="175"/>
    <line x1="200" y1="175" x2="235" y2="150"/>
    <line x1="200" y1="175" x2="180" y2="210"/>
    <line x1="200" y1="175" x2="230" y2="210"/>
    <line x1="180" y1="210" x2="230" y2="210"/>
    <circle cx="170" cy="155" r="7"/>
    <circle cx="235" cy="150" r="7"/>
    <circle cx="200" cy="175" r="9" fill="#e9d5ff"/>
    <circle cx="180" cy="210" r="7"/>
    <circle cx="230" cy="210" r="7"/>
  </g>

  <!-- chip pins -->
  <g stroke="#7e22ce" stroke-width="6" stroke-linecap="round">
    <line x1="140" y1="130" x2="140" y2="112"/>
    <line x1="170" y1="112" x2="170" y2="98"/>
    <line x1="200" y1="98" x2="200" y2="112"/>
    <line x1="230" y1="112" x2="230" y2="98"/>
    <line x1="260" y1="130" x2="260" y2="112"/>

    <line x1="140" y1="240" x2="140" y2="258"/>
    <line x1="170" y1="258" x2="170" y2="272"/>
    <line x1="200" y1="272" x2="200" y2="258"/>
    <line x1="230" y1="258" x2="230" y2="272"/>
    <line x1="260" y1="240" x2="260" y2="258"/>
  </g>

  <!-- floating badge: chat -->
  <g transform="translate(60,240)">
    <circle cx="22" cy="22" r="28" fill="#ffffff"/>
    <circle cx="22" cy="22" r="28" fill="none" stroke="#f3e8ff" stroke-width="2"/>
    <path d="M10,14 h24 a4 4 0 0 1 4 4 v10 a4 4 0 0 1 -4 4 h-14 l-8 7 v-7 h-2 a4 4 0 0 1 -4 -4 v-10 a4 4 0 0 1 4 -4 Z" fill="#a855f7"/>
  </g>

  <!-- floating badge: sparkle -->
  <g transform="translate(295,70)">
    <circle cx="18" cy="18" r="24" fill="#ffffff"/>
    <circle cx="18" cy="18" r="24" fill="none" stroke="#f3e8ff" stroke-width="2"/>
    <path d="M18,6 L21,15 L30,18 L21,21 L18,30 L15,21 L6,18 L15,15 Z" fill="#a855f7"/>
  </g>
